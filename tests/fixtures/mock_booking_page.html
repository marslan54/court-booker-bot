<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mock Court Booking</title>
</head>
<body>
  <h1>Mock Court Booking</h1>
  <form>
    <label>Court</label>
    <select name="court">
      <option>Court 1</option>
      <option>Court 2</option>
      <option>Court 3</option>
    </select>
    <label>Date</label>
    <input name="date" type="date" />
    <label>Start</label>
    <select name="start_time">
      <option>18:00</option>
      <option>19:00</option>
      <option>20:00</option>
    </select>
    <label>End</label>
    <select name="end_time">
      <option>19:00</option>
      <option>20:00</option>
      <option>21:00</option>
    </select>
    <input name="name" placeholder="Name" />
    <input name="email" placeholder="Email" />
    <input name="phone" placeholder="Phone" />
    <button type="submit">Book</button>
  </form>
</body>
</html>
